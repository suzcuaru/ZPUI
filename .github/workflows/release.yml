name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Verify dist/ exists
        shell: bash
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/)" ]; then
            echo "ERROR: dist/ directory is empty or missing"
            echo "Run release.bat locally first to build and commit dist/"
            exit 1
          fi
          echo "dist/ contents:"
          ls -la dist/

      - name: Build portable zip
        shell: bash
        run: |
          cd dist
          zip -r ../zpui-win32.zip .
          cd ..
          ls -la zpui-win32.zip

      - name: Find installer
        id: installer
        shell: bash
        run: |
          INSTALLER=$(find dist/ -name "ZPUI-Setup-*.exe" | head -1)
          if [ -n "$INSTALLER" ]; then
            echo "path=$INSTALLER" >> "$GITHUB_OUTPUT"
            echo "Found installer: $INSTALLER"
          else
            echo "No installer found in dist/"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"

          ASSETS=("zpui-win32.zip" "dist/versions.json")
          if [ -n "${{ steps.installer.outputs.path }}" ]; then
            ASSETS+=("${{ steps.installer.outputs.path }}")
          fi

          EXTRA=""
          if [[ "$VER" == *-* ]]; then EXTRA="--draft"; fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${ASSETS[@]}" --clobber
          else
            gh release create "$TAG" "${ASSETS[@]}" \
              --title "ZPUI $VER" --generate-notes $EXTRA
          fi
