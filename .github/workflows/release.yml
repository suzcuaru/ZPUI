name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Version: $V"

      - name: Verify dist/ exists
        shell: bash
        run: |
          if [ ! -d "dist" ] || [ -z "$(ls -A dist/)" ]; then
            echo "ERROR: dist/ directory is empty or missing"
            echo "Run release.bat locally first to build and commit dist/"
            exit 1
          fi
          echo "dist/ contents:"
          ls -la dist/

      - name: Build portable zip
        shell: bash
        run: |
          cd dist
          zip -r ../zpui-win64.zip .
          cd ..
          ls -la zpui-win64.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          VER="${{ steps.ver.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          IS_DEV=0
          if [[ "$VER" == *-* ]]; then IS_DEV=1; fi

          EXTRA=""
          if [ "$IS_DEV" = "1" ]; then EXTRA="--draft"; fi

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              "zpui-win64.zip" \
              "dist/versions.json" \
              --clobber
          else
            gh release create "$TAG" \
              "zpui-win64.zip" \
              "dist/versions.json" \
              --title "ZPUI $VER" --generate-notes $EXTRA
          fi
