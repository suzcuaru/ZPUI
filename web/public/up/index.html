<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
    <title>ZPUI — Статус системы</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --glass: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --accent: #00d4ff;
            --text: #e8e8e8;
            --text2: #777;
            --radius: 16px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(0,212,255,0.04) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(123,47,247,0.04) 0%, transparent 50%);
        }
        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 40px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            position: relative;
        }
        .logo {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, #00d4ff, #7b2ff7);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 24px;
            color: #fff;
            margin: 0 auto 20px;
        }
        h1 { font-size: 22px; margin-bottom: 4px; background: linear-gradient(135deg, #00d4ff, #7b2ff7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 28px; }
        .info-grid { text-align: left; }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            font-size: 14px;
        }
        .info-row .label { color: var(--text2); }
        .info-row .value { font-weight: 500; word-break: break-all; text-align: right; max-width: 60%; }
        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-badge.running { background: rgba(46,213,115,0.15); color: #2ed573; }
        .status-badge.stopped { background: rgba(255,71,87,0.15); color: #ff4757; }
        .refresh-hint { font-size: 11px; color: var(--text2); margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">Z</div>
        <h1>Статус ZPUI</h1>
        <div class="subtitle" id="timestamp">Загрузка...</div>
        <div class="info-grid">
            <div class="info-row"><span class="label">Имя устройства</span><span class="value" id="hostname">--</span></div>
            <div class="info-row"><span class="label">IP-адрес</span><span class="value" id="ip">--</span></div>
            <div class="info-row"><span class="label">MAC-адрес</span><span class="value" id="mac">--</span></div>
            <div class="info-row"><span class="label">Запрет</span><span class="value" id="zapretStatus">--</span></div>
            <div class="info-row"><span class="label">Версия Запрета</span><span class="value" id="zapretVersion">--</span></div>
            <div class="info-row"><span class="label">Стратегия</span><span class="value" id="strategy">--</span></div>
            <div class="info-row"><span class="label">Прокси</span><span class="value" id="proxyStatus">--</span></div>
            <div class="info-row"><span class="label">Загрузка</span><span class="value" id="download">--</span></div>
            <div class="info-row"><span class="label">Отдача</span><span class="value" id="upload">--</span></div>
            <div class="info-row"><span class="label">Скорость загрузки</span><span class="value" id="dlSpeed">--</span></div>
            <div class="info-row"><span class="label">Скорость отдачи</span><span class="value" id="ulSpeed">--</span></div>
            <div class="info-row"><span class="label">Версия ZPUI</span><span class="value" id="modVersion">--</span></div>
        </div>
        <div class="refresh-hint">Автообновление каждые 5 секунд</div>
    </div>
    <script>
        async function load() {
            try {
                const res = await fetch('/api/up/info');
                const d = await res.json();
                document.getElementById('timestamp').textContent = d.timestamp || '--';
                document.getElementById('hostname').textContent = d.hostname || '--';
                document.getElementById('ip').textContent = (d.ip || []).join(', ');
                document.getElementById('mac').textContent = d.mac || '--';

                const z = d.zapret || {};
                document.getElementById('zapretStatus').innerHTML =
                    `<span class="status-badge ${z.status}">${z.status === 'running' ? 'работает' : 'остановлен'}</span>`;
                document.getElementById('zapretVersion').textContent = z.version || '--';
                document.getElementById('strategy').textContent = z.strategy || '--';

                const p = d.proxy || {};
                document.getElementById('proxyStatus').innerHTML =
                    `<span class="status-badge ${p.running ? 'running' : 'stopped'}">${p.running ? 'работает' : 'остановлен'} :${p.port}</span>`;

                const t = d.traffic || {};
                document.getElementById('download').textContent = t.download || '--';
                document.getElementById('upload').textContent = t.upload || '--';
                document.getElementById('dlSpeed').textContent = t.dl_speed || '--';
                document.getElementById('ulSpeed').textContent = t.ul_speed || '--';
                document.getElementById('modVersion').textContent = d.mod_version || '--';
            } catch (e) {
                document.getElementById('timestamp').textContent = 'Ошибка подключения';
            }
        }
        load();
        setInterval(load, 5000);
    </script>
</body>
</html>
